# 本地全栈编排。运行：
#   docker compose -f deploy/docker-compose.yml up -d --build
# 变量缺省值已能直接跑；如需覆盖，复制 .env.example 为 .env（与本文件同目录）。

x-backend: &backend
  build:
    context: ../backend
    dockerfile: Dockerfile
  image: tms-backend:dev
  environment: &backend-env
    DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.local}
    DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-secret-change-me-min-32-bytes}
    DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
    DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
    DJANGO_CORS_ORIGINS: ${DJANGO_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    LOG_FORMAT: ${LOG_FORMAT:-json}
    DATABASE_URL: ${DATABASE_URL:-postgres://tms:tms_dev_pwd@db:5432/tms}
    DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
    CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    JWT_ACCESS_MIN: ${JWT_ACCESS_MIN:-30}
    JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
    DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
    DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
    DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-60}
  volumes:
    - ../backend:/app
  restart: unless-stopped

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tms}
      POSTGRES_USER: ${POSTGRES_USER:-tms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tms_dev_pwd}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tms} -d ${POSTGRES_DB:-tms}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    <<: *backend
    command: ["web"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    <<: *backend
    command: ["worker"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    <<: *backend
    command: ["beat"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
